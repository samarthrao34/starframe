name: Hostinger Deploy

on:
  push:
    branches:
      - main
      - master
      - feature1
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Hostinger via FTP
        env:
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          python3 << 'EOF'
          import ftplib
          import os
          import sys
          from pathlib import Path
          
          FTP_HOST = '147.93.99.197'
          FTP_USER = os.environ['FTP_USER']
          FTP_PASS = os.environ['FTP_PASS']
          
          EXCLUDE = {'.git', '.github', 'node_modules', '.vscode', 'server', 'api', 'scripts', 'logs', 'data'}
          EXCLUDE_EXT = {'.md'}
          
          def should_skip(path):
              p = Path(path)
              if p.suffix in EXCLUDE_EXT:
                  return True
              for part in p.parts:
                  if part in EXCLUDE or part.startswith('.'):
                      return True
              return False
          
          try:
              ftp = ftplib.FTP(FTP_HOST, timeout=30)
              ftp.login(FTP_USER, FTP_PASS)
              print(f"✓ Connected to {FTP_HOST}")
              
              uploaded = 0
              for root, dirs, files in os.walk('.'):
                  dirs[:] = [d for d in dirs if not should_skip(d)]
                  for file in files:
                      path = os.path.join(root, file)
                      if should_skip(path):
                          continue
                      
                      remote = path.replace('./', '').replace('\\', '/')
                      rdir = '/'.join(remote.split('/')[:-1])
                      
                      try:
                          if rdir:
                              try:
                                  ftp.mkd(rdir)
                              except:
                                  pass
                          
                          with open(path, 'rb') as f:
                              ftp.storbinary(f'STOR {remote}', f)
                          print(f"✓ {remote}")
                          uploaded += 1
                      except Exception as e:
                          print(f"✗ {remote}: {e}")
              
              ftp.quit()
              print(f"\n✓ Deployed {uploaded} files")
              
          except Exception as e:
              print(f"✗ Error: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF
