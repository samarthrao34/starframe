name: Hostinger Deploy

on:
  push:
    branches:
      - main
      - master
      - feature1
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FTP client
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy static site over FTP
        env:
          FTP_HOST: 147.93.99.197
          FTP_PORT: 21
          FTP_USER: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
        run: |
          # Create a temporary credentials file to avoid shell escaping issues
          cat > ~/.netrc << EOF
          machine 147.93.99.197
          login $FTP_USER
          password $FTP_PASS
          EOF
          chmod 600 ~/.netrc
          
          # Deploy using lftp with .netrc
          lftp -e "
          set ftp:passive-mode true
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          open 147.93.99.197
          cd public_html
          mirror -R --verbose --exclude-glob .git* --exclude-glob .github --exclude-glob node_modules --exclude-glob .vscode --exclude-glob server --exclude-glob api --exclude-glob scripts --exclude-glob logs --exclude-glob data --exclude-glob '*.md' ./ ./
          quit
          " || exit 1
