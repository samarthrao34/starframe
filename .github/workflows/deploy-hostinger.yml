name: Hostinger Deploy

on:
  push:
    branches:
      - main
      - master
      - feature1
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site over FTP
        uses: ftpjs/action@v1.0.1
        with:
          host: 147.93.99.197
          port: 21
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local_dir: ./
          remote_dir: /public_html/
          delete: false
