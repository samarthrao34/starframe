name: Hostinger Deploy

on:
  push:
    branches:
      - main
      - master
      - feature1
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: 147.93.99.197
          port: 21
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.vscode/**
            **/server/**
            **/api/**
            **/scripts/**
            **/logs/**
            **/data/**
            **/*.md
