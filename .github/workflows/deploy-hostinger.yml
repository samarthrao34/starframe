name: Hostinger Deploy

on:
  push:
    branches:
      - main
      - master
      - feature1
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy static site over FTP
        uses: sebastianpopp/ftp-action@v2.1.1
        with:
          host: 147.93.99.197
          user: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          localDir: ./
          remoteDir: /public_html
