<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StarFrame Animation Studio</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style-new.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Text:wght@400;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .hero-bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }
        
        .login-container {
            background: transparent;
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        
        .login-header {
            margin-bottom: 2rem;
        }
        
        .login-header h1 {
            color: black;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .login-header p {
            color: black;
            font-size: 1rem;
        }
        
        .login-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .google-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: transparent;
            color: black;
            border: 2px solid black;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .google-login-btn:hover {
            background: black;
            color: white;
            border: 2px solid black;
            transform: translateY(-2px);
        }
        
        .google-icon {
            width: 24px;
            height: 24px;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: black;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: black;
        }
        
        .divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }
        
        .admin-login-btn {
            background: transparent;
            color: black;
            border: 2px solid black;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .admin-login-btn:hover {
            background: black;
            color: white;
            border: 2px solid black;
            transform: translateY(-2px);
        }
        
        .features-list {
            text-align: left;
            margin: 2rem 0;
            padding: 1.5rem;
            background: transparent;
            border-radius: 12px;
            border-left: 4px solid transparent;
        }
        
        .features-list h3 {
            color: black;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }
        
        .features-list ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .features-list li {
            padding: 0.5rem 0;
            color: black;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .features-list li i {
            color: black;
            width: 16px;
        }
        
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .sparkle {
            position: absolute;
            color: rgba(255,255,255,0.6);
            animation: float 6s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 1; }
        }
        
        .pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(254, 252, 248, 0.85) 0%,
                rgba(249, 246, 242, 0.75) 50%,
                rgba(212, 165, 116, 0.25) 100%
            );
            z-index: -1;
        }
    </style>
    <style>
        .btn-secondary:hover {
            background-color: black !important;
            color: white !important;
        }
    </style>
</head>
<body>
    <a href="/" class="btn btn-secondary" style="position: absolute; top: 2rem; left: 2rem; color: black; border-color: black;">
        <i class="fas fa-arrow-left"></i> Back to Home
    </a>
    <div class="hero-background">
        <img src="images/StarFrame Animation Studio/landscape.jpeg" alt="Hero Background" class="hero-bg-image">
    </div>
    <div class="hero-overlay"></div>
    <div class="sparkles" id="sparkles"></div>

    <div class="login-container">
        <div class="login-header">
            <h1>Welcome to StarFrame</h1>
            <p>Sign in to access your personalized animation studio experience</p>
        </div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="login-options">
            <!-- Google Login Button -->
            <a href="/api/auth/google" class="google-login-btn pulse">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </a>
            
            <div class="features-list">
                <h3>🎨 What you'll get:</h3>
                <ul>
                    <li><i class="fas fa-user-circle"></i> Personalized dashboard</li>
                    <li><i class="fas fa-bell"></i> Real-time project updates</li>
                    <li><i class="fas fa-history"></i> Activity tracking</li>
                    <li><i class="fas fa-cog"></i> Custom preferences</li>
                    <li><i class="fas fa-rocket"></i> Priority support</li>
                </ul>
            </div>
            
            <div class="divider">
                <span>or</span>
            </div>
            
            <!-- Admin Login -->
            <a href="/admin" class="admin-login-btn">
                <i class="fas fa-shield-alt"></i> Admin Access
            </a>
        </div>
    </div>

    <script>
        // Create floating sparkles
        function createSparkles() {
            const sparklesContainer = document.getElementById('sparkles');
            const sparkleEmojis = ['✨', '⭐', '🌟', '💫', '⚡'];
            
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = Math.random() * 100 + '%';
                    sparkle.style.animationDelay = Math.random() * 6 + 's';
                    sparkle.style.fontSize = Math.random() * 10 + 15 + 'px';
                    
                    sparklesContainer.appendChild(sparkle);
                    
                    // Remove sparkle after animation completes
                    setTimeout(() => {
                        sparkle.remove();
                    }, 6000);
                }, i * 300);
            }
        }
        
        // Check for error messages in URL
        function checkForErrors() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            const errorMessage = document.getElementById('errorMessage');
            
            if (error) {
                let message = '';
                switch (error) {
                    case 'oauth_failed':
                        message = 'Google authentication failed. Please try again.';
                        break;
                    case 'oauth_error':
                        message = 'An error occurred during login. Please try again.';
                        break;
                    default:
                        message = 'An unexpected error occurred. Please try again.';
                }
                
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                
                // Clear error from URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }
        
        // Track page visit
        function trackPageVisit() {
            // Simple analytics tracking
            if (typeof gtag !== 'undefined') {
                gtag('event', 'page_view', {
                    page_title: 'Login Page',
                    page_location: window.location.href
                });
            }
        }
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            createSparkles();
            checkForErrors();
            trackPageVisit();
            
            // Recreate sparkles every 10 seconds
            setInterval(createSparkles, 10000);
            
            // Add click tracking
            document.querySelectorAll('a, button').forEach(element => {
                element.addEventListener('click', function() {
                    const action = this.textContent.trim();
                    console.log('User clicked:', action);
                });
            });
        });
        
        // Add hover effects
        document.addEventListener('mousemove', function(e) {
            const sparkle = document.createElement('div');
            sparkle.style.position = 'absolute';
            sparkle.style.left = e.clientX + 'px';
            sparkle.style.top = e.clientY + 'px';
            sparkle.style.color = 'rgba(255,255,255,0.8)';
            sparkle.style.fontSize = '12px';
            sparkle.style.pointerEvents = 'none';
            sparkle.style.zIndex = '1000';
            sparkle.textContent = '✨';
            sparkle.style.animation = 'fadeOut 1s ease-out forwards';
            
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        });
        
        // Add fadeOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
                100% {
                    opacity: 0;
                    transform: scale(1.5) translateY(-20px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>


</body>
</html>
