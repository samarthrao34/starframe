<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Purchases - StarFrame Animation Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.1);
            padding: 15px 0;
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo h1 {
            font-family: 'Playfair Display', serif; font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-logo a { text-decoration: none; }
        .nav-tagline { font-size: 0.65rem; color: #888; display: block; }
        .nav-menu { list-style: none; display: flex; gap: 10px; align-items: center; }
        .nav-link {
            text-decoration: none; color: #ccc; font-size: 0.85rem; padding: 8px 12px;
            border-radius: 6px; transition: all 0.3s;
        }
        .nav-link:hover { color: #fff; background: rgba(102, 126, 234, 0.1); }
        .commission-btn {
            background: linear-gradient(135deg, #667eea, #764ba2) !important;
            color: #fff !important; font-weight: 600;
        }

        /* Page Content */
        .page-container {
            max-width: 1000px; margin: 0 auto; padding: 120px 20px 60px;
        }
        .page-header {
            text-align: center; margin-bottom: 40px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif; font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .page-header p { color: #888; font-size: 1.1rem; }

        /* Login prompt */
        .login-prompt {
            text-align: center; padding: 60px 20px;
            background: rgba(255,255,255,0.03); border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .login-prompt i { font-size: 3rem; color: #667eea; margin-bottom: 20px; }
        .login-prompt h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .login-prompt p { color: #888; margin-bottom: 20px; }
        .login-btn {
            display: inline-block; padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; text-decoration: none; border-radius: 8px;
            font-weight: 600; transition: transform 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); }

        /* Loading */
        .loading {
            text-align: center; padding: 60px 20px;
        }
        .loading i { font-size: 2rem; color: #667eea; }

        /* Purchases Grid */
        .purchases-list { display: flex; flex-direction: column; gap: 16px; }

        .purchase-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 20px;
            display: flex; align-items: center; gap: 20px;
            transition: all 0.3s;
        }
        .purchase-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            background: rgba(255,255,255,0.05);
        }
        .purchase-image {
            width: 80px; height: 80px; border-radius: 10px;
            object-fit: cover; flex-shrink: 0;
        }
        .purchase-info { flex: 1; }
        .purchase-title {
            font-weight: 600; font-size: 1.1rem; margin-bottom: 4px; color: #fff;
        }
        .purchase-category {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-size: 0.75rem; background: rgba(102, 126, 234, 0.15);
            color: #667eea; margin-bottom: 6px;
        }
        .purchase-meta {
            font-size: 0.85rem; color: #888;
        }
        .purchase-meta span { margin-right: 15px; }
        .purchase-actions { flex-shrink: 0; }
        .download-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 20px; border-radius: 8px; border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; font-weight: 600; cursor: pointer;
            text-decoration: none; font-size: 0.9rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .download-btn.expired {
            background: #444; cursor: not-allowed; pointer-events: none;
        }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 60px 20px;
            background: rgba(255,255,255,0.03); border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .empty-state i { font-size: 3rem; color: #444; margin-bottom: 20px; }
        .empty-state h2 { font-size: 1.3rem; margin-bottom: 10px; color: #999; }
        .empty-state p { color: #666; margin-bottom: 20px; }
        .shop-link {
            display: inline-block; padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff; text-decoration: none; border-radius: 8px;
            font-weight: 600;
        }

        /* Summary */
        .purchase-summary {
            display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .summary-card {
            flex: 1; min-width: 150px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px; padding: 20px; text-align: center;
        }
        .summary-card .value {
            font-size: 1.8rem; font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .summary-card .label { font-size: 0.85rem; color: #888; margin-top: 5px; }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .purchase-card { flex-direction: column; text-align: center; }
            .purchase-image { width: 120px; height: 120px; }
            .purchase-summary { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">
                    <h1>StarFrame</h1>
                    <span class="nav-tagline">Animation Studio</span>
                </a>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="shop.html" class="nav-link">Shop</a></li>
                <li class="nav-item"><a href="track-commission.html" class="nav-link">Track Order</a></li>
                <li class="nav-item"><a href="purchases.html" class="nav-link" style="color: #667eea;">My Purchases</a></li>
                <li class="nav-item"><a href="commission.html" class="nav-link commission-btn">Commission</a></li>
            </ul>
        </div>
    </nav>

    <div class="page-container">
        <div class="page-header">
            <h1>My Purchases</h1>
            <p>View and download your digital art purchases</p>
        </div>

        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p style="margin-top: 10px; color: #888;">Loading your purchases...</p>
            </div>
        </div>
    </div>

    <script>
        async function init() {
            const content = document.getElementById('content');

            try {
                // Check if user is logged in
                const authCheck = await fetch('/api/client/profile');
                if (!authCheck.ok) {
                    content.innerHTML = `
                        <div class="login-prompt">
                            <i class="fas fa-lock"></i>
                            <h2>Login Required</h2>
                            <p>Please log in to view your purchase history and download your art.</p>
                            <a href="login.html?redirect=purchases.html" class="login-btn">
                                <i class="fas fa-sign-in-alt"></i> Log In
                            </a>
                        </div>
                    `;
                    return;
                }

                // Fetch purchases
                const response = await fetch('/api/shop/my-purchases');
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to load purchases');
                }

                const purchases = data.purchases || [];

                if (purchases.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-bag-shopping"></i>
                            <h2>No Purchases Yet</h2>
                            <p>You haven't purchased any digital art yet. Browse our shop to find amazing artwork!</p>
                            <a href="shop.html" class="shop-link">
                                <i class="fas fa-store"></i> Browse Shop
                            </a>
                        </div>
                    `;
                    return;
                }

                // Calculate summary
                const totalSpent = purchases.reduce((sum, p) => sum + (p.price_inr || 0), 0);

                let html = `
                    <div class="purchase-summary">
                        <div class="summary-card">
                            <div class="value">${purchases.length}</div>
                            <div class="label">Total Purchases</div>
                        </div>
                        <div class="summary-card">
                            <div class="value">₹${totalSpent.toLocaleString()}</div>
                            <div class="label">Total Spent</div>
                        </div>
                        <div class="summary-card">
                            <div class="value">${purchases.filter(p => p.download_token).length}</div>
                            <div class="label">Available Downloads</div>
                        </div>
                    </div>
                    <div class="purchases-list">
                `;

                purchases.forEach(purchase => {
                    const date = new Date(purchase.purchased_at || purchase.created_at);
                    const dateStr = date.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
                    const downloadUrl = purchase.download_token ? `/api/shop/download/${purchase.download_token}` : null;

                    html += `
                        <div class="purchase-card">
                            <img src="${purchase.image_url || 'images/StarFrame Animation Studio/landscape.jpeg'}" 
                                 alt="${purchase.title || 'Digital Art'}" class="purchase-image">
                            <div class="purchase-info">
                                <div class="purchase-title">${purchase.title || 'Digital Art'}</div>
                                <span class="purchase-category">${purchase.category || 'Art'}</span>
                                <div class="purchase-meta">
                                    <span><i class="fas fa-calendar"></i> ${dateStr}</span>
                                    <span><i class="fas fa-tag"></i> ₹${purchase.price_inr || 0}</span>
                                </div>
                            </div>
                            <div class="purchase-actions">
                                ${downloadUrl 
                                    ? `<a href="${downloadUrl}" class="download-btn" target="_blank">
                                        <i class="fas fa-download"></i> Download
                                       </a>` 
                                    : `<span class="download-btn expired">
                                        <i class="fas fa-clock"></i> Processing
                                       </span>`
                                }
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                content.innerHTML = html;

            } catch (err) {
                console.error(err);
                content.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Error Loading Purchases</h2>
                        <p>${err.message}</p>
                        <a href="purchases.html" class="shop-link" onclick="location.reload(); return false;">
                            <i class="fas fa-redo"></i> Retry
                        </a>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
